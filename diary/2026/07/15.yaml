verses:
  "14:60":
    - "そこで、大祭司は立ち上がり、真ん中に進み出て、イエスに尋ねた。「何も答えないのか、この者たちがお前に不利な証言をしているが、どうなのか。」"
  "14:61":
    - "しかし、イエスは黙り続け何もお答えにならなかった。そこで、重ねて大祭司は尋ね、「お前はほむべき方の子、メシアなのか」と言った。"
  "14:62":
    - "イエスは言われた。「そうです。"
    - "あなたたちは、人の子が全能の神の右に座り、"
    - "天の雲に囲まれて来るのを見る。」"
