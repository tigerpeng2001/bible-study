verses:
  "15:12":
    - "そこで、ピラトは改めて、「それでは、ユダヤ人の王とお前たちが言っているあの者は、どうしてほしいのか」と言った。"
  "15:13":
    - "群衆はまた叫んだ。「十字架につけろ。」"
  "15:14":
    - "ピラトは言った。「いったいどんな悪事を働いたというのか。」群衆はますます激しく、「十字架につけろ」と叫び立てた。"
  "15:15":
    - "ピラトは群衆を満足させようと思って、バラバを釈放した。そして、イエスを鞭打ってから、十字架につけるために引き渡した。"
