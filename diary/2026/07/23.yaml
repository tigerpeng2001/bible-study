  改めて: "adv. あらためて. 改めて. again / once more."
  いったい: "adv. 一体. いったい. what on earth / really."
  悪事: "n. あくじ. 悪事. evil deed / wrongdoing."
  働いた: "v. はたらく. 働いた. worked (past tense)."
  ますます: "adv. 益々. ますます. increasingly / more and more."
  激しく: "adv. はげしく. 激しく. intensely / violently."
  叫び立てた: "v. さけびたてる. 叫び立てた. shouted / yelled (past tense)."
  満足させよう: "v. まんぞくさせる. 満足させよう. to satisfy / to please (volitional form)."
  釈放: "v. しゃくほう. 釈放. release / set free."
