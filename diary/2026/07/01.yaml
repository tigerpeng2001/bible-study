date: "2026-07-01"
weekday: "Wednesday"
book: "マルコの福音書"
version: "新共同訳 (日本聖書協会 1987, 1988)"
target_language: "Japanese"
verses:
  "14:27":
    - "イエスは弟子たちに言われた。「あなたがたは皆わたしにつまずく。"
    - "『わたしは羊飼いを打つ。"
    - "すると、羊は散ってしまう』"
    - "と書いてあるからだ"
  "14:28":
    - "しかし、わたしは復活した後、あなたがたより先にガリラヤへ行く。」"
  "14:29":
    - "するとペトロが、「たとえ、みんながつまずいても、わたしはつまずきません」と言った。"
  "14:30":
    - "イエスは言われた。「はっきり言っておくが、あなたは、今日、今夜、鶏が二度鳴く前に、三度わたしのことを知らないと言うだろう。」"
  "14:31":
    - "ペトロは力を込めて言い張った。「たとえ、御一緒に死なねばならなくなっても、あなたのことを知らないなどとは決して申しません。」皆の者も同じように言った。"
vocabulary:
  つまずく: "v. 躓く. つまずく. to stumble / to trip"
  羊飼い: "n. 羊飼い. ひつじかい. shepherd"
  打つ: "v. 打つ. うつ. to strike / to hit"
  散る: "v. 散る. ちる. to scatter / to fall"
  復活: "n. 復活. ふっかつ. resurrection"
  のち: "adv. 後. のち. after / later"
  先に: "adv. 先に. さきに. before / ahead"
  すると: "conj. すると. すると. then, thereupon"
  たとえ: "adv. たとえ. たとえ. even if / even though"
  はっきり: "adv. はっきり. はっきり. clearly / plainly"
  おく: "v. 置く. おく. to put / to place"
  鶏: "n. 鶏. にわとり. chicken / rooster"
  二度: "n. 二度. にど. twice / two times"
  鳴く: "v. 鳴く. なく. to sing / to chirp (for birds)"
  三度: "n. 三度. さんど. three times"
  力を込めて: "phrase. 力を込めて. ちからをこめて. with all one's strength / forcefully"
