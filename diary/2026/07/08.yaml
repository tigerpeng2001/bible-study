verses:
  "14:43":
    - "さて、イエスがまだ話しておられると、十二人の一人であるユダが進み寄って来た。祭司長、律法学者、長老たちの遣わした群衆も、剣や棒を持って一緒に来た。 "
  "14:44":
    - "イエスを裏切ろうとしていたユダは、「わたしが接吻するのが、その人だ。捕まえて、逃がさないように連れて行け」と、前もって合図を決めていた"
  "14:45":
    - "ユダはやって来るとすぐに、イエスに近寄り、「先生」と言って接吻した。"
  "14:46":
    - "人々は、イエスに手をかけて捕らえた。"
