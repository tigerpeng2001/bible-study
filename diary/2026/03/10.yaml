verses:
  "8:31":
    - "Jesús comenzó a enseñarles que el Hijo del Hombre debía padecer muchas cosas,"
    - "y ser rechazado por los ancianos, los principales sacerdotes y los escribas, y ser muerto, y después de tres días resucitar."
  "8:32":
    - "Y les decía estas palabras claramente. Entonces Pedro lo llevó aparte y comenzó a reprender a Jesús."
  "8:33":
    - "Pero Él volviéndose y mirando a Sus discípulos, reprendió a Pedro y le dijo*:"
    - "«¡Quítate de delante de Mí, Satanás!, porque no tienes en mente las cosas de Dios, sino las de los hombres»."
