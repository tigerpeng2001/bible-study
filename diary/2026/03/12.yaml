verses:
  "9:1":
    - "また、イエスは言われた。「はっきり言っておく。ここに一緒にいる人々の中には、神の国が力にあふれて現れるのを見るまでは、決して死なない者がいる。」"
  "9:2":
    - "六日の後、イエスは、ただペトロ、ヤコブ、ヨハネだけを連れて、高い山に登られた。イエスの姿が彼らの目の前で変わり、"
  "9:3":
    - "服は真っ白に輝き、この世のどんなさらし職人の腕も及ばぬほど白くなった。"
  "9:4":
    - "エリヤがモーセと共に現れて、イエスと語り合っていた。"
