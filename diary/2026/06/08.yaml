grammar:
  se puede ocultar: "The phrase 'se puede ocultar' is a passive construction that means 'can be hidden'. It is used to indicate that something is not able to be hidden or concealed. In this context, it emphasizes that a city situated on a hill cannot be hidden from view."
  ni se enciende...sino: "The structure 'ni...sino' is used to contrast two actions or states. In this case, it contrasts the action of lighting a lamp and putting it under a vessel with the action of putting it on a candlestick. It emphasizes that the lamp should not be hidden but should be placed in a position where it can illuminate."
  los que están en la casa: "The phrase 'los que están en la casa' refers to the people who are inside the house. It emphasizes that the lamp should illuminate everyone within the household, symbolizing the idea that the disciples' good deeds should be visible to all."
  para que vean...glorifiquen: "The structure 'para que...glorifiquen' is used to express purpose. It indicates that the reason for letting the light shine before others is so that they may see the good deeds and glorify the Father in heaven. It emphasizes the intended outcome of the disciples' actions."
