verses:
  "12:41":
    - "Jesús se sentó frente al arca del tesoro, y observaba cómo la multitud echaba dinero en el arca del tesoro;"
    - "y muchos ricos echaban grandes cantidades. "
  "12:42":
    - "Llegó una viuda pobre y echó dos pequeñas monedas de cobre, o sea, un cuadrante"
  "12:43":
    - "Y llamando Jesús a Sus discípulos, les dijo:"
    - "«En verdad les digo, que esta viuda pobre echó más que todos los contribuyentes al tesoro; "
  "12:44":
    - "porque todos ellos echaron de lo que les sobra, pero ella, de su pobreza, echó todo lo que poseía, todo lo que tenía para vivir»."
