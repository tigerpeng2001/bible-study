grammar:
  ことになる: "The phrase 'ことになる' is used to indicate that something will happen as a result of circumstances or decisions. It often implies that the outcome is somewhat inevitable or has been decided by external factors. In this context, it is used to describe the future events that will happen to the disciples as a result of their association with Jesus."
  ねばならない: "The phrase 'ねばならない' is a formal way to express obligation or necessity. It is often used in written language and formal speech. In this context, it is used to indicate that the gospel must be proclaimed to all nations, emphasizing the importance and inevitability of this task."
