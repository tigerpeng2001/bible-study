  mejor le fuera: "This phrase is a combination of the adverb 'mejor' (better) and the verb 'ir' (to go) in its third person singular form 'fuera' (subjunctive mood). It is used to express that it would be better for someone in a certain situation, often implying that the current situation is undesirable."
