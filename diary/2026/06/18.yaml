verses:
  "14:3":
    - "イエスがベタニアで重い皮膚病の人シモンの家にいて、食事の席に着いておられたとき、一人の女が、純粋で非常に高価なナルドの香油の入った石膏の壺を持って来て、それを壊し、香油をイエスの頭に注ぎかけた。"
  "14:4":
    - "そこにいた人の何人かが、憤慨して互いに言った。「なぜ、こんなに香油を無駄遣いしたのか。"
  "14:5":
    - "この香油は三百デナリオン以上に売って、貧しい人々に施すことができたのに。」そして、彼女を厳しくとがめた。"
vocabulary:
