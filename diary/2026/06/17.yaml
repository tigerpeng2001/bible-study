  いけない: "phrase. いけない. いけない. must not, should not"
  祭りの間: "phrase. まつりのあいだ. 祭りの間. during the festival"
  やめておこう: "phrase. やめておこう. やめておこう. let's not do it, let's wait"
grammar:
  やめておこう:
    base_verb:
      kanji: 止める / 辞める
      hiragana: やめる
      meaning: To stop / to abandon / to cease
    conjugation:
      form: te-form
      japanese: やめて
      hiragana: やめて
      nuance: Abandoning and...
    auxiliary_addition:
      verb: 置く
      hiragana: おく
      meaning: To put / to place
      auxiliary_function: To leave a state as it is / to do something in advance
    combined_form:
      japanese: やめておく
      hiragana: やめておく
      meaning: To deliberately choose not to do something (and leave it at that)
    volitional_ending:
      suffix: う
      hiragana: う
      nuance: Let's / I will
    final_form:
      japanese: やめておこう
      hiragana: やめておこう
      meaning: Let's deliberately not do it / I think I'll pass
