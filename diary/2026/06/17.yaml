date: "2026-06-17"
weekday: "Wednesday"
book: "マルコの福音書"
version: "新共同訳 (日本聖書協会 1987, 1988)"
target_language: "Japanese"
verses:
  "14:1":
    - "さて、過越祭と除酵祭の二日前になった。祭司長たちや律法学者たちは、なんとか計略を用いてイエスを捕らえて殺そうと考えていた。"
  "14:2":
    - "彼らは、「民衆が騒ぎだすといけないから、祭りの間はやめておこう」と言っていた。"
vocabulary:
  さて: "adv. さて. さて. well then, now"
  過越祭: "n. すぎこしさい. 過越祭. Passover"
  除酵祭: "n. じょこうさい. 除酵祭. Feast of Unleavened Bread"
  二日前: "phrase. ふつかまえ. 二日前. two days before"
  祭司長: "n. さいしちょう. 祭司長. chief priest"
  律法学者: "n. りっぽうがくしゃ. 律法学者. scribe"
  なんとか: "adv. なんとか. なんとか. somehow, in some way, one way or another, by some means,  anyhow, by hook or by crook"
  計略: "n. けいりゃく. 計略. plot, scheme"
  用いて: "v. もちいる. 用いて. use (te-form)"
  捕らえて: "v. とらえる. 捕らえて. capture (te-form)"
  殺そう: "v. ころす. 殺そう. try to kill (volitional form)"
  考えていた: "v. かんがえていた. 考えていた. was thinking"
  捕らえる: "v. とらえる. 捕らえる. capture, seize"
