verses:
  "12:35":
    - "イエスは神殿の境内で教えていたとき、こう言われた。「どうして律法学者たちは、『メシアはダビデの子だ』と言うのか。"
  "12:36":
    - "ダビデ自身が聖霊を受けて言っている。"
    - "『主は、わたしの主にお告げになった。"
    - "「わたしの右の座に着きなさい。わたしがあなたの敵を"
    - "あなたの足もとに屈服させるときまで」と。』"
  "12:37":
    - "このようにダビデ自身がメシアを主と呼んでいるのに、どうしてメシアがダビデの子なのか。」大勢の群衆は、イエスの教えに喜んで耳を傾けた。"
