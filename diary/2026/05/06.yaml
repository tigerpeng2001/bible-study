verses:
  "11:15":
    - "それから、一行はエルサレムに来た。イエスは神殿の境内に入り、そこで売り買いしていた人々を追い出し始め、両替人の台や鳩を売る者の腰掛けをひっくり返された。"
  "11:16":
    - "また、境内を通って物を運ぶこともお許しにならなかった。"
  "11:17":
    - "そして、人々に教えて言われた。「こう書いてあるではないか。"
    - "『わたしの家は、すべての国の人の"
    - "祈りの家と呼ばれるべきである。』"
    - "ところが、あなたたちは"
    - "それを強盗の巣にしてしまった。」"
