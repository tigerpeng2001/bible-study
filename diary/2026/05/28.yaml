book: "マルコの福音書"
version: "新共同訳 (日本聖書協会 1987, 1988)"
target_language: "Japanese"
verses:
  "12:38":
    - "イエスは教えの中でこう言われた。「律法学者に気をつけなさい。彼らは、長い衣をまとって歩き回ることや、広場で挨拶されること、"
  "12:39":
    - "会堂では上席、宴会では上座に座ることを望み、"
  "12:40":
    - "また、やもめの家を食い物にし、見せかけの長い祈りをする。このような者たちは、人一倍厳しい裁きを受けることになる。」"
vocabulary:
  気をつけなさい: "v. きをつけなさい. 気をつけなさい. be careful, watch out (imperative form)"
  まとって: "v. まとう. まとって. to wear, to put on (gerund form)"
  歩き回る: "v. あるきまわる. 歩き回る. to walk around (gerund form)"
  広場: "n. ひろば. 広場. plaza, square"
  挨拶される: "v. あいさつされる. �挨拶される. to be greeted (passive form)"
  会堂: "n. かいどう. 会堂. synagogue"
  上席: "n. じょうせき. 上席. upper seat"
  宴会: "n. えんかい. 宴会. banquet, feast"
  上座: "n. じょうざ. 上座. upper seat"
  やもめの家: "n. やもめのいえ. やもめの家. widow's house"
  食い物にする: "v. くいものにする. 食い物にする. to exploit, to take advantage of"
  見せかけの長い祈り: "n. みせかけのながいきのり. 見せかけの長い祈り. pretentious long prayers"
  人一倍厳しい裁き: "n. ひといちばいきびしいさばき. 人一倍厳しい裁き. more severe judgment than others"
grammar:
  - "～に気をつけなさい: This is a common expression in Japanese that means 'be careful of' or 'watch out for'. It is often used to warn someone about potential dangers or to advise them to be cautious. In this context, Jesus is warning his followers to be careful of the behavior of the Pharisees."
  - "～を望む: This expression means 'to desire' or 'to hope for'. It is used to indicate someone's wishes or aspirations. In this context, the Pharisees desire to be greeted in the squares and to have the best seats in the synagogues and at banquets."
  - "～を食い物にする:This phrase means 'to exploit' or 'to take advantage of'. It is used to describe someone who takes advantage of others for their own benefit. In this context, Jesus accuses the Pharisees of exploiting widows' houses."
  - "～することになる: This expression indicates a consequence or result of an action. It can be translated as 'will receive' or 'will face'. In this context, Jesus says that those who behave like the Pharisees will receive more severe judgment than others."
  - 人一倍: This term means 'more than others' or 'to a greater extent than others'. It is used to emphasize that the judgment will be harsher for those who behave like the Pharisees compared to others. In this context, it indicates that the Pharisees will face a more severe judgment than the average person due to their actions.
  - 食い物にする: to turn (someone/something) to food. 'to exploit' or 'to take advantage of'. 
