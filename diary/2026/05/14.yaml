grammar:
  話し始められた: 
  - base: "話しはじめ"
  - suffix: "~られる"
  - meaning: "to start talking (honorific form)"
  "わたしの息子なら敬ってくれるだろう":
  - base: "わたしの息子なら敬う"
  - suffix: "くれるだろう"
    "くれる": "aux. くれる. くれる. to give (to the speaker or someone close to the speaker). Shows the action benefits the speaker"
    "だろう": "aux. だろう. だろう. probably, I guess"
  - meaning: "If it is my son, they will respect him (expectation)"
