date: "2026-05-21"
weekday: "Thursday"
book: "マルコの福音書"
version: "新共同訳 (日本聖書協会 1987, 1988)"
target_language: "Japanese"
verses:
  "12:18":
    - "復活はないと言っているサドカイ派の人々が、イエスのところへ来て尋ねた。"
  "12:19":
    - "「先生、モーセはわたしたちのために書いています。"
    - "『ある人の兄が死に、妻を後に残して子がない場合、その弟は兄嫁と結婚して、兄の跡継ぎをもうけねばならない』と。"
  "12:20":
    - "ところで、七人の兄弟がいました。長男が妻を迎えましたが、跡継ぎを残さないで死にました。"
  "12:21":
    - "次男がその女を妻にしましたが、跡継ぎを残さないで死に、三男も同様でした。"
  "12:22":
    - "こうして、七人とも跡継ぎを残しませんでした。最後にその女も死にました。"
  "12:23":
    - "復活の時、彼らが復活すると、その女はだれの妻になるのでしょうか。七人ともその女を妻にしたのです。」"
vocabulary:
  復活: "n. ふっかつ. 復活. resurrection"
