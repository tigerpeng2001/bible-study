grammar:
  もうけねばならない: 
    - "obligation form: must have"
    - "儲ける (もうける) is the verb for 'to have' or 'to bear' in the context of offspring. The obligation form 'もうけねばならない' indicates that it is necessary to have offspring in this situation."
    - "ねば. short form of なければ, if not/unless"
    - "ならない. auxiliary verb indicating obligation or necessity, meaning 'must' or 'have to'"
