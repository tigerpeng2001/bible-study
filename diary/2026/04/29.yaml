verses:
  "11:1":
    - "一行がエルサレムに近づいて、オリーブ山のふもとにあるベトファゲとベタニアにさしかかったとき、イエスは二人の弟子を使いに出そうとして、"
  "11:2":
    - "言われた。「向こうの村へ行きなさい。村に入るとすぐ、まだだれも乗ったことのない子ろばのつないであるのが見つかる。それをほどいて、連れて来なさい。"
  "11:3":
    - "もし、だれかが、『なぜ、そんなことをするのか』と言ったら、『主がお入り用なのです。すぐここにお返しになります』と言いなさい。」 "
