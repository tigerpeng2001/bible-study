target_language: "Japanese"
verses:
  "10:32":
    - "一行がエルサレムへ上って行く途中、イエスは先頭に立って進んで行かれた。それを見て、弟子たちは驚き、従う者たちは恐れた。"
    - "イエスは再び十二人を呼び寄せて、自分の身に起ころうとしていることを話し始められた。"
  "10:33":
    - "「今、わたしたちはエルサレムへ上って行く。人の子は祭司長たちや律法学者たちに引き渡される。彼らは死刑を宣告して異邦人に引き渡す。"
  "10:34":
    - "異邦人は人の子を侮辱し、唾をかけ、鞭打ったうえで殺す。そして、人の子は三日の後に復活する。」"
