    context, Jesus accuses the Pharisees of exploiting widows' houses.
  - '～することになる: This expression indicates a consequence or result of an action. It
    can be translated as ''will receive'' or ''will face''. In this context, Jesus
    says that those who behave like the Pharisees will receive more severe judgment
    than others.'
