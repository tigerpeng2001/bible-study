    reconstructed_historical_sound: An earlier variation of the *ngʉat phonetic lineage
    historical_linguistic_proof: 'Imported during an older linguistic era than ''getsu''.
      The "-t" suffix collapsed directly into  the vowel "-u" to create "gatu" (ガツ).
      You can still see this hard ancient "-t" structure  when it collapses into a
      double consonant (sokuon) in compound words, such as 一ヶ月 (ikka-getsu / ikka-pi).

      '
  - modern_reading: つき (tsuki)
    origin_type: Kunyomi
    reconstructed_historical_sound: '*tukiy (Proto-Japonic / Old Japanese)'
    historical_linguistic_proof: Attested in 8th-century texts like the Kojiki and
      Man'yoshu. Historical phonologists trace this back  to an ancient root "*tuku",
      which was used to refer to both the moon and the tracking of passing time/months.  The
      modern "tsuki" sound stabilized during the Middle Japanese period as the ancient
      "t-" sound before "u"  naturally affricated into "ts-".
